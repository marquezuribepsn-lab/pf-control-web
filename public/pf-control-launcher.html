<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PF Control - Inicio Rapido</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #1e293b;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --primary: #0ea5e9;
      --primary-hover: #0284c7;
      --accent: #22c55e;
      --ring: rgba(14, 165, 233, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at 20% 20%, #1d4ed8 0%, transparent 35%),
                  radial-gradient(circle at 80% 80%, #22c55e 0%, transparent 30%),
                  linear-gradient(135deg, var(--bg1), var(--bg2));
      color: #e2e8f0;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(900px, 100%);
      background: var(--card);
      color: var(--text);
      border-radius: 16px;
      box-shadow: 0 16px 50px rgba(2, 6, 23, 0.35);
      overflow: hidden;
    }

    .header {
      padding: 22px 24px;
      background: linear-gradient(90deg, #0ea5e9, #22c55e);
      color: #ffffff;
    }

    .header h1 {
      margin: 0 0 6px;
      font-size: 1.4rem;
    }

    .header p {
      margin: 0;
      opacity: 0.95;
      font-size: 0.95rem;
    }

    .content {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      padding: 20px 24px 24px;
    }

    .status {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 12px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .links {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    }

    a.btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      text-align: center;
      border-radius: 10px;
      padding: 12px 14px;
      background: #e0f2fe;
      color: #075985;
      border: 1px solid #bae6fd;
      font-weight: 600;
      transition: transform 140ms ease, background 140ms ease, box-shadow 140ms ease;
    }

    a.btn:hover {
      transform: translateY(-1px);
      background: #bae6fd;
      box-shadow: 0 6px 20px var(--ring);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .primary {
      background: var(--primary);
      color: white;
    }

    .primary:hover {
      background: var(--primary-hover);
    }

    .ok {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #86efac;
    }

    .warn {
      background: #fef9c3;
      color: #854d0e;
      border: 1px solid #fde047;
    }

    code {
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 6px;
      padding: 2px 6px;
      font-size: 0.85rem;
    }

    @media (max-width: 640px) {
      .header h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <main class="card">
    <section class="header">
      <h1>PF Control - HTML de Inicio</h1>
      <p>Abre este acceso desde cualquier celular, tablet o PC en tu red local.</p>
    </section>

    <section class="content">
      <div class="status" id="status">
        Detectando direccion del servidor...
      </div>

      <div class="actions">
        <button class="primary" id="openApp">Abrir Aplicacion</button>
        <button class="ok" id="copyUrl">Copiar URL Base</button>
        <button class="warn" id="copyLauncher">Copiar URL de este HTML</button>
      </div>

      <div class="links" id="quickLinks"></div>

      <div class="status">
        Si no abre en otro dispositivo, verifica que ejecutaste <code>npm run dev</code> y que ambos equipos esten en la misma red Wi-Fi.
      </div>
    </section>
  </main>

  <script>
    const base = window.location.origin;
    const launcher = window.location.href;

    const routes = [
      { label: "Inicio", path: "/" },
      { label: "Ejercicios", path: "/ejercicios" },
      { label: "Sesiones", path: "/sesiones" },
      { label: "Equipos", path: "/equipos" },
      { label: "Wellness", path: "/wellness" }
    ];

    const status = document.getElementById("status");
    status.innerHTML = `Servidor detectado en <code>${base}</code><br/>HTML de inicio: <code>${launcher}</code>`;

    const links = document.getElementById("quickLinks");
    routes.forEach((route) => {
      const a = document.createElement("a");
      a.className = "btn";
      a.href = base + route.path;
      a.textContent = route.label;
      links.appendChild(a);
    });

    document.getElementById("openApp").addEventListener("click", () => {
      window.location.href = base + "/";
    });

    async function copy(text) {
      try {
        await navigator.clipboard.writeText(text);
        alert("Copiado: " + text);
      } catch {
        prompt("Copia manualmente:", text);
      }
    }

    document.getElementById("copyUrl").addEventListener("click", () => copy(base));
    document.getElementById("copyLauncher").addEventListener("click", () => copy(launcher));
  </script>
</body>
</html>
